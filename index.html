<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MatLibras</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#4caf50" />
  <link rel="apple-touch-icon" href="./assets/imgs/pwa-192x192.png">
  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('ServiceWorker registrado! Escopo:', reg.scope))
          .catch(err => console.log('Falha no registro do ServiceWorker:', err));
      });
    }
  </script>

<script 
        async 
        crossorigin="anonymous" 
        data-clerk-publishable-key="pk_test_d29uZHJvdXMtZ29zaGF3ay0zOC5jbGVyay5hY2NvdW50cy5kZXYk" 
        src="https://wondrous-goshawk-38.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" 
        type="text/javascript">
    </script>
  <!-- Dependências do Estado e Componentes -->
  <script type="module" src="./assets/store.js"></script>
  <script type="module" src="./src/components/screen-search.js"></script>
  <script type="module" src="./src/components/screen-dict.js"></script>
  <script type="module" src="./src/components/screen-libras.js"></script>
  <script type="module" src="./src/components/screen-account.js"></script>
  <script type="module" src="./src/components/bottom-nav.js"></script>
  <script type="module" src="./src/components/video-modal.js"></script>
</head>
<body>
  <!-- Aviso para Desktop -->
  <div id="desktop-warning" class="desktop-warning">
    <div class="desktop-warning__content">
      <img src="./assets/imgs/logo-matlibras.jpeg" alt="Logo MatLibras" class="desktop-warning__logo" />
      <h2>Acesso pelo celular</h2>
      <p>Este aplicativo foi desenvolvido especialmente para dispositivos móveis. Escaneie o QR Code abaixo com a câmera do seu celular para acessar:</p>
      <img src="./public/assets/imgs/qr-code.png" alt="QR Code" class="desktop-warning__qr" />
    </div>
  </div>

  <div class="app">
    <!-- HEADER (muda por tela) -->
    <header class="header">
      <div class="header__left">
        <img src="./assets/imgs/logo-matlibras.jpeg" alt="Logo MatLibras" class="header__logo" />
        <h1 id="headerTitle" class="header__title"></h1>
      </div>
      <div id="user-button"></div>
    </header>

    <!-- MAIN -->
    <main class="main">
        <screen-search></screen-search>
        <screen-dict></screen-dict>
        <screen-libras></screen-libras>
        <screen-account></screen-account>
    </main>

    <!-- BOTTOM NAV -->
    <bottom-nav></bottom-nav>

    <!-- PWA Install Prompt -->
    <div id="pwa-prompt" class="pwa-prompt">
      <img src="./assets/imgs/pwa-192x192.png" alt="MatLibras Icon" class="pwa-prompt__icon" />
      <div class="pwa-prompt__content">
        <h3 class="pwa-prompt__title">Instalar MatLibras</h3>
        <p class="pwa-prompt__desc">Adicione à tela inicial para acesso rápido e offline.</p>
      </div>
      <div class="pwa-prompt__actions">
        <button id="pwa-install-btn" class="pwa-prompt__btn">Instalar</button>
        <button id="pwa-close-btn" class="pwa-prompt__btn pwa-prompt__btn--close">Agora não</button>
      </div>
    </div>
  </div>

  <!-- Inicialização do App -->
  <script>
    let deferredPrompt;
    const pwaPrompt = document.getElementById('pwa-prompt');
    const installBtn = document.getElementById('pwa-install-btn');
    const closeBtn = document.getElementById('pwa-close-btn');

    // Escuta o evento que o navegador dispara quando identifica que o app pode ser instalado
    window.addEventListener('beforeinstallprompt', (e) => {
      // Previne o prompt padrão de aparecer imediatamente (menos no Chrome 67 e anteriores)
      e.preventDefault();
      // Guarda o evento para usá-lo depois.
      deferredPrompt = e;
      // Atualiza a UI para notificar o usuário que ele pode instalar o PWA
      pwaPrompt.classList.add('is-visible');
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        // Mostra o prompt de instalação nativo
        deferredPrompt.prompt();
        // Espera o usuário responder
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response to the install prompt: ${outcome}`);
        // O prompt não pode mais ser usado
        deferredPrompt = null;
      }
      // Esconde a nossa custom UI independentemente do resultado
      pwaPrompt.classList.remove('is-visible');
    });

    closeBtn.addEventListener('click', () => {
      pwaPrompt.classList.remove('is-visible');
    });

    // Detecta se o aplicativo já foi instalado e executado no modo standalone
    window.addEventListener('appinstalled', () => {
      // Esconde o botão e o prompt
      pwaPrompt.classList.remove('is-visible');
      deferredPrompt = null;
      console.log('PWA was installed');
    });
  </script>

  <video-modal></video-modal>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
